name: Rotação diária de questões

on:
  schedule:
    - cron: "5 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-question-rotation
  cancel-in-progress: false

jobs:
  rotate:
    name: Atualizar seleção diária
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Gerar rotação diária
        run: npm run rotate:daily

      - name: Validar build estático
        run: npm run build

      - name: Publicar seleção do dia se houver mudança
        shell: bash
        run: |
          if git diff --quiet -- data/daily-selection.json data/daily-history.json; then
            echo "Sem mudança nos arquivos de rotação diária."
            exit 0
          fi

          DATE="$(node -e "const fs=require('node:fs'); console.log(JSON.parse(fs.readFileSync('data/daily-selection.json','utf8')).date)")"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/daily-selection.json data/daily-history.json
          git commit -m "chore: rotação diária de questões ${DATE}"
          git push origin main
